<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="do_you_love_me.css" />
    <title>我的小猪律师</title>
  </head>
  <body>
    <div class="question-container container">
      <div class="main-gif-container">
        <img class="main-gif" src="assets/gifs/do you love me.gif" alt="Cute Gif">
      </div>
      
      <h2 class="question">你爱我吗?</h2>
      <div class="button-container">
        <button class="yes-btn btn js-yes-btn">是的</button>
        <button class="no-btn btn js-no-btn">不</button>
      </div>
    </div>
    
    <div class="result-container container">
      <img class="gif-result" src="assets/gifs/carry_you.gif" alt="Success GIF">
      <img class="gif-result-1" src="assets/gifs/flower_love.gif" alt="Success GIF">
      <img class="gif-result-2" src="assets/gifs/loveyow.gif" alt="Success GIF">
      <img class="gif-result-3" src="assets/gifs/walkinglove_you.gif" alt="Success GIF">
      <img class="gif-result-4" src="assets/gifs/cheek_you.gif" alt="Success GIF">
      <img class="gif-result-5" src="assets/gifs/clingy_you.gif" alt="Success GIF">
      <h2>我就知道😍!</h2>
    </div>
    <div class="cssload-main">
      <div class="cssload-heart">
        <span class="cssload-heartL"></span>
        <span class="cssload-heartR"></span>
        <span class="cssload-square"></span>
      </div>
      <div class="cssload-shadow"></div>
    </div>
    <script src="do_you_love_me.js"></script>
  </body>
</html>
